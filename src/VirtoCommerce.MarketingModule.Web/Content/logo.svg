<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128" role="img" aria-label="Marketing">
  <title>Marketing</title>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="92%" y2="100%">
      <stop offset="0%" stop-color="#F88A8D"/>
      <stop offset="100%" stop-color="#E5484D"/>
    </linearGradient>
    <filter id="lift" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="3.5" flood-color="#7A1417" flood-opacity="0.30"/>
    </filter>
  </defs>

  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <g transform="translate(60,64) rotate(-10)" filter="url(#lift)">
    <!-- Horn -->
    <polygon points="-36,-8 -12,-12 16,-32 16,32 -12,12 -36,8" fill="#ffffff"/>
    <!-- Mouthpiece -->
    <rect x="-44" y="-8" width="9" height="16" rx="3" fill="#ffffff"/>
    <!-- Rim band -->
    <rect x="12" y="-32" width="8" height="64" rx="4" fill="#FFC24D"/>
    <!-- Sound waves -->
    <path d="M28,-14 a18,18 0 0 1 0,28" fill="none" stroke="#FFC24D" stroke-width="5" stroke-linecap="round"/>
    <path d="M38,-24 a30,30 0 0 1 0,48" fill="none" stroke="#FFE08A" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
